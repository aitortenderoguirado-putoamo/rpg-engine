<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0c0c0e" />
  <meta name="description" content="Motor RPG Persistente — Un juego de rol de simulación narrativa persistente." />
  <title>Motor RPG Persistente</title>
  
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* Reset & Theme Variables */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --bg-color: #08080a;
      --bg-gradient: radial-gradient(circle at 50% 50%, #121016 0%, #08080a 100%);
      --card-bg: rgba(18, 18, 24, 0.75);
      --card-border: rgba(255, 255, 255, 0.12);
      --card-border-hover: rgba(168, 85, 247, 0.5);
      --text-primary: #f8fafc;
      --text-secondary: #e2e8f0;
      --text-muted: #94a3b8;
      
      --accent-primary: #a855f7;
      --accent-secondary: #6366f1;
      --accent-gradient: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
      --accent-glow: 0 0 20px rgba(168, 85, 247, 0.35);
      
      --border-subtle: rgba(255, 255, 255, 0.08);
      --panel-bg-subtle: rgba(255, 255, 255, 0.03);
      --panel-bg-darker: rgba(0, 0, 0, 0.25);
      --panel-bg-hover: rgba(255, 255, 255, 0.05);
      --input-bg: rgba(8, 8, 10, 0.6);
      
      --color-health: #f43f5e;
      --color-fatigue: #f59e0b;
      --color-hunger: #10b981;
      --color-money: #eab308;
      --color-mental: #06b6d4;
      
      --color-success: #10b981;
      --color-fail: #ef4444;
      --color-crit: #3b82f6;
      --color-botch: #d946ef;
      
      --font-title: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
      
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.5);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.6);
      --shadow-glow: 0 0 15px rgba(168, 85, 247, 0.2);
    }

    body.light-theme {
      --bg-color: #f1f5f9;
      --bg-gradient: radial-gradient(circle at 50% 50%, #ffffff 0%, #cbd5e1 100%);
      --card-bg: rgba(255, 255, 255, 0.92);
      --card-border: rgba(15, 23, 42, 0.15);
      --card-border-hover: rgba(168, 85, 247, 0.75);
      --text-primary: #0f172a;
      --text-secondary: #1e293b;
      --text-muted: #475569;
      
      --border-subtle: rgba(15, 23, 42, 0.1);
      --panel-bg-subtle: rgba(15, 23, 42, 0.04);
      --panel-bg-darker: rgba(15, 23, 42, 0.08);
      --panel-bg-hover: rgba(15, 23, 42, 0.06);
      --input-bg: rgba(255, 255, 255, 0.95);
      
      --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08);
      --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.04);
      --accent-glow: 0 0 15px rgba(168, 85, 247, 0.15);
    }
    
    body {
      font-family: var(--font-body);
      background-color: var(--bg-color);
      background-image: var(--bg-gradient);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }
    
    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(8, 8, 10, 0.5);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(168, 85, 247, 0.3);
    }
    
    /* Global Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes diceRoll {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.2); filter: drop-shadow(0 0 15px var(--accent-primary)); }
      100% { transform: rotate(360deg) scale(1); }
    }
    
    @keyframes pulseGlow {
      0% { box-shadow: 0 0 5px rgba(168, 85, 247, 0.2); }
      50% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.5); }
      100% { box-shadow: 0 0 5px rgba(168, 85, 247, 0.2); }
    }
    
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }

    .animate-fade {
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    .animate-dice {
      animation: diceRoll 0.6s ease-out;
    }

    .animate-float {
      animation: float 3s ease-in-out infinite;
    }
    
    /* Glassmorphism helpers */
    .glass-panel {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      box-shadow: var(--shadow-md);
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }
    
    .glass-panel:hover {
      border-color: rgba(255, 255, 255, 0.12);
    }

    /* Collapsible Sidebar system */
    .game-container-flex {
      display: flex;
      gap: 20px;
      width: 100%;
      align-items: stretch;
      transition: gap 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .main-narrative-area {
      flex-grow: 1;
      width: 68%;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .main-narrative-area.expanded {
      width: 100%;
    }
    .sidebar-panel {
      width: 32%;
      min-width: 320px;
      max-width: 380px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 1;
      transform: translateX(0);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .sidebar-panel.collapsed {
      width: 0;
      min-width: 0;
      max-width: 0;
      opacity: 0;
      transform: translateX(100px);
      pointer-events: none;
      margin: 0;
      border: none;
      padding: 0;
    }

    /* Mobile Responsive styles for vertical phone screens */
    .mobile-bottom-nav {
      display: none;
    }

    @media (max-width: 768px) {
      .game-container-flex {
        flex-direction: column !important;
        gap: 0 !important;
      }
      
      .mobile-view-narrativa .sidebar-panel {
        display: none !important;
      }
      
      .mobile-view-sidebar .main-narrative-area {
        display: none !important;
      }
      
      .main-narrative-area, .sidebar-panel {
        width: 100% !important;
        min-width: 100% !important;
        max-width: 100% !important;
      }
      
      .main-narrative-area .glass-panel {
        height: calc(100vh - 350px) !important;
        min-height: 400px !important;
      }
      
      .sidebar-panel .glass-panel {
        height: calc(100vh - 280px) !important;
      }
      
      body {
        padding-bottom: 75px !important;
      }
      
      .mobile-bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 65px;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-top: 1px solid var(--card-border);
        justify-content: space-around;
        align-items: center;
        z-index: 1000;
        padding-bottom: env(safe-area-inset-bottom);
        box-sizing: border-box;
      }
      
      .mobile-nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        color: var(--text-muted);
        background: none;
        border: none;
        font-size: 0.7rem;
        cursor: pointer;
        padding: 5px 10px;
        transition: color 0.2s ease;
      }
      
      .mobile-nav-item.active {
        color: var(--accent-primary);
      }
      
      .mobile-nav-icon {
        font-size: 1.2rem;
      }
      
      /* Make settings and creator screens scrollable on mobile */
      .animate-fade {
        max-height: calc(100vh - 40px);
        overflow-y: auto;
        padding-bottom: 80px;
      }
    }

    /* ChatGPT Chat Aesthetic bubbles */
    .chat-bubble {
      display: flex;
      flex-direction: column;
      margin-bottom: 24px;
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .user-bubble {
      align-self: flex-end;
      align-items: flex-end;
      width: 100%;
    }
    .user-bubble-content {
      background: rgba(168, 85, 247, 0.12);
      border: 1px solid rgba(168, 85, 247, 0.25);
      border-radius: 16px 16px 2px 16px;
      padding: 12px 16px;
      max-width: 80%;
      color: var(--text-primary);
      font-size: 0.95rem;
      box-shadow: var(--shadow-sm);
    }
    .master-bubble {
      align-self: flex-start;
      align-items: flex-start;
      width: 100%;
    }
    .master-bubble-content {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 16px 16px 16px 2px;
      padding: 20px 24px;
      width: 100%;
      color: var(--text-primary);
      font-size: 1.05rem;
      line-height: 1.65;
      box-sizing: border-box;
      box-shadow: var(--shadow-md);
    }
    body.light-theme .user-bubble-content {
      background: rgba(168, 85, 247, 0.08);
      border-color: rgba(168, 85, 247, 0.2);
    }

    body.light-theme ::-webkit-scrollbar-thumb {
      background: rgba(15, 23, 42, 0.18);
    }
    body.light-theme ::-webkit-scrollbar-thumb:hover {
      background: rgba(168, 85, 247, 0.55);
    }
    
    /* Input & Button Base resets for nice look */
    input, textarea, select {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      color: var(--text-primary);
      border-radius: 6px;
      padding: 10px 14px;
      font-family: var(--font-body);
      transition: all 0.2s ease;
    }
    
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
    }

    /* Markdown rendering styling similar to ChatGPT */
    .markdown-content p {
      margin-top: 0;
      margin-bottom: 16px;
      line-height: 1.7;
    }
    .markdown-content p:last-child {
      margin-bottom: 0;
    }
    .markdown-content h1, 
    .markdown-content h2, 
    .markdown-content h3, 
    .markdown-content h4 {
      font-family: var(--font-title);
      color: var(--text-primary);
      margin-top: 24px;
      margin-bottom: 12px;
      font-weight: 700;
      line-height: 1.35;
    }
    .markdown-content h1 { font-size: 1.45rem; border-bottom: 1px solid var(--border-subtle); padding-bottom: 6px; }
    .markdown-content h2 { font-size: 1.25rem; }
    .markdown-content h3 { font-size: 1.1rem; }
    .markdown-content h4 { font-size: 0.95rem; }
    
    .markdown-content hr {
      border: 0;
      border-top: 1px solid var(--border-subtle);
      margin: 24px 0;
    }
    
    .markdown-content ul, 
    .markdown-content ol {
      margin-top: 0;
      margin-bottom: 16px;
      padding-left: 24px;
    }
    .markdown-content li {
      margin-bottom: 8px;
    }
    .markdown-content strong {
      color: var(--text-primary);
      font-weight: 600;
    }
    .markdown-content em {
      font-style: italic;
    }
    .markdown-content blockquote {
      margin: 0 0 16px 0;
      padding: 0 0 0 16px;
      border-left: 4px solid var(--accent-primary);
      color: var(--text-secondary);
      font-style: italic;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
